services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ai_caller_user:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/ai_caller
      - SESSION_MIDDLEWARE_SECRET_KEY=${SESSION_MIDDLEWARE_SECRET_KEY:?set in .env}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?set in .env}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=ai_caller_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - POSTGRES_DB=ai_caller
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

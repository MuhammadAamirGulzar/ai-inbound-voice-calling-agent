<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - OrderSaathi</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/admin/style.css">
    <style>
        .password-strength-meter {
            height: 4px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-strength-meter-fill {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        .password-strength-text {
            font-size: 13px;
            margin-top: 4px;
            font-weight: 500;
        }
        .password-criteria-list {
            margin-top: 8px;
            padding-left: 16px;
            list-style-type: disc;
        }
        .password-criteria-list li {
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-brand">
                    <i class="fa-solid fa-microphone-lines mr-2"></i>OrderSaathi
                </div>
                <h2 class="auth-title">Set New Password</h2>
                <p class="auth-subtitle">You are logged in as <strong>{{ username }}</strong>. Please set a new password to secure your account.</p>
            </div>

            <form action="/change-password" method="POST" id="change-password-form">
                <div id="error-message" style="color: var(--danger); background-color: rgba(244, 63, 94, 0.1); border: 1px solid var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px;"></div>
                
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <input class="form-control" type="password" id="password" name="new_password" placeholder="Min. 8 characters" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm New Password</label>
                    <input class="form-control" type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 10px; height: 44px;">
                    Update Password & Continue
                </button>
            </form>
        </div>
    </div>

    <script src="/static/password-validator.js"></script>
    <script>
        document.getElementById('change-password-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const errorDiv = document.getElementById('error-message');
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            const passwordVal = document.getElementById('password').value;
            const confirmPasswordVal = document.getElementById('confirm_password').value;

            // Basic regex matching the validator script requirements
            const hasUppercase = /[A-Z]/.test(passwordVal);
            const hasLowercase = /[a-z]/.test(passwordVal);
            const hasNumber = /[0-9]/.test(passwordVal);
            const hasSpecial = /[^A-Za-z0-9]/.test(passwordVal);

            if (passwordVal.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters long.';
                errorDiv.style.display = 'block';
                return;
            }

            if (!hasUppercase || !hasLowercase || !hasNumber || !hasSpecial) {
                errorDiv.textContent = 'Password must include uppercase, lowercase, numbers, and special characters.';
                errorDiv.style.display = 'block';
                return;
            }

            if (passwordVal !== confirmPasswordVal) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Updating password...';
            submitBtn.disabled = true;

            const formData = new FormData(this);
            fetch("/change-password", {
                method: "POST",
                body: formData
            })
            .then(async response => {
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Password update failed.');
                }
                return data;
            })
            .then(data => {
                if (data.redirect_url) {
                    window.location.href = data.redirect_url;
                }
            })
            .catch(error => {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            });
        });
    </script>
</body>

</html>
